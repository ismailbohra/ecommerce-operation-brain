services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    container_name: ecommerce-brain
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      # Container-specific overrides (all other vars come from env_file: backend/.env)
      - DATABASE_URL=postgresql://ecomx:ecomx@postgres:5432/ecomx
      - QDRANT_MODE=server
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_PATH=/app/data/qdrant
    volumes:
      # Persist vector store data
      - app-data:/app/data
    networks:
      - ecommerce-network

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecomx
      POSTGRES_PASSWORD: ecomx
      POSTGRES_DB: ecomx
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecomx -d ecomx"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ecommerce-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: on-failure
    ports:
      - "3000:80"
    depends_on:
      - app
    networks:
      - ecommerce-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ecommerce-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - ecommerce-network

volumes:
  app-data:
    driver: local
  postgres-data:
    driver: local
  qdrant-data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
